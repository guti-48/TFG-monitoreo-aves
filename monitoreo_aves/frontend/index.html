<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BirdMonitor | Panel Control de Datos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css?v=1000">
</head>

<body>
    <div id="app-shell">

        <aside id="sidebar-wrapper">
            
            <div class="sidebar-brand">
                <i class="bi bi-feather brand-icon"></i>
                <div class="brand-text">BirdMonitor<span class="brand-accent">.AI</span></div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" id="btn-dashboard" class="nav-link active" onclick="switchView('dashboard'); return false;">
                    <i class="bi bi-activity"></i>
                    <span>Tiempo Real</span>
                </a>
                <a href="#" id="btn-history" class="nav-link" onclick="switchView('history'); return false;">
                    <i class="bi bi-database-fill"></i>
                    <span>Histórico</span>
                </a>
                <a href="#" id="btn-science" class="nav-link" onclick="switchView('science'); return false;">
                    <i class="bi bi-bar-chart-line-fill"></i>
                    <span>Análisis Eco</span>
                </a>
                <a href="#" id="btn-nodes" class="nav-link" onclick="switchView('nodes'); return false;">
                    <i class="bi bi-hdd-network"></i>
                    <span>Nodos</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-link">
                    <i class="bi bi-gear"></i>
                    <span>Ajustes</span>
                </a>
                <div class="sidebar-version">v2.1 · Sevilla, ES</div>
            </div>
        </aside>


        <div id="page-content-wrapper">

            <!-- Topbar -->
            <header id="topbar">
                <div class="topbar-left">
                    <i class="bi bi-broadcast-pin topbar-icon"></i>
                    <span id="topbar-view-title">Monitorización Global</span>
                </div>
                <div class="topbar-right">
                    <span class="text-muted small me-2">Estado del Sistema:</span>
                    <span class="status-pill">
                        <span class="status-dot"></span>
                        En Línea
                    </span>
                </div>
            </header>

            <!-- Contenido dinámico -->
            <main id="main-content"></main>

        </div>
    </div>

    <script src="js/dashboard.js?v=1000"></script>
</body>
</html>
