<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdMonitor AI | Panel Profesional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="wrapper">
        
        <div id="sidebar-wrapper" class="d-flex flex-column">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase brand-text">
                <i class="bi bi-feather me-2"></i>BirdMonitor<span class="text-accent">.AI</span>
            </div>
            <div class="list-group list-group-flush my-3 flex-grow-1">
                <a href="#" id="btn-dashboard" class="list-group-item active" onclick="switchView('dashboard')">
                    <i class="bi bi-activity me-3"></i>Tiempo Real
                </a>
                <a href="#" class="list-group-item text-muted disabled">
                    <i class="bi bi-collection-play me-3"></i>Histórico
                </a>
                <a href="#" id="btn-nodes" class="list-group-item text-muted" onclick="switchView('nodes')">
                    <i class="bi bi-hdd-network me-3"></i>Nodos
                </a>
                <a href="#" class="list-group-item text-muted mt-auto">
                    <i class="bi bi-gear me-3"></i>Ajustes
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            
            <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3 border-bottom border-dark-subtle main-navbar">
                <div class="container-fluid">
                    <h2 class="fs-5 m-0 fw-semibold">
                        <span id="dashboard-title"><i class="bi bi-broadcast text-success me-2 animate-pulse"></i>Monitorización Global</span>
                    </h2>
                    <div class="ms-auto d-flex align-items-center status-indicator">
                        <span class="me-2 text-muted small">Estado del Sistema:</span>
                        <span class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill"><i class="bi bi-check-circle-fill me-2"></i>En Línea</span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4" id="main-content">
                </div>

        </div> </div> <script src="js/dashboard.js"></script>
</body>
</html>
