<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdMonitor AI - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-soundwave"></i> BirdMonitor AI
            </a>
            <span class="text-white small">Sistema de Monitoreo Acústico v1.0</span>
        </div>
    </nav>

    <div class="container my-4">
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle me-3">
                            <i class="bi bi-broadcast text-success fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">Estado del Sistema</h6>
                            <h5 class="mb-0 fw-bold text-success">Activo</h5>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
                            <i class="bi bi-music-note-beamed text-primary fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">Total Detecciones</h6>
                            <h5 class="mb-0 fw-bold" id="total-counter">0</h5>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="bg-warning bg-opacity-10 p-3 rounded-circle me-3">
                            <i class="bi bi-cpu text-warning fs-3"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-0">Última Actividad</h6>
                            <h5 class="mb-0 fw-bold small" id="last-activity">Esperando...</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <h5 class="text-muted mb-3"><i class="bi bi-bullseye"></i> Último Avistamiento</h5>
                <div id="latest-detection-card" class="card border-0 shadow-lg border-start border-5 border-success">
                    <div class="card-body text-center p-5">
                        <h3 class="text-muted">Cargando datos...</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-clock-history"></i> Historial Reciente</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Hora</th>
                                <th>Especie</th>
                                <th>Confianza</th>
                                <th>Dispositivo</th>
                                <th>Archivo</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <footer class="text-center text-muted py-4 mt-5 small">
        <p>&copy; 2026 TFG Ingeniería Informática - Carlos Gutiérrez</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
